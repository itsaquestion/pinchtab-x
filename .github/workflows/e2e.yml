name: E2E Curl Tests

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test (leave empty for current)'
        required: false
        default: ''
      debug:
        description: 'Enable debug logging'
        required: false
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    name: E2E Curl Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run E2E tests
        id: e2e
        run: |
          set +e
          mkdir -p tests/e2e/results
          docker compose -f tests/e2e/docker-compose.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from runner 2>&1 | tee e2e-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          
          # Extract summary from logs
          PASSED=$(grep -oP 'Passed:\s*\K\d+' e2e-output.log | tail -1 || echo "0")
          FAILED=$(grep -oP 'Failed:\s*\K\d+' e2e-output.log | tail -1 || echo "0")
          
          # Get failed test names if any
          FAILURES=$(grep -E '✗.*failed' e2e-output.log | sed 's/.*✗ /- /' | head -10 || true)
          
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          {
            echo 'failures<<EOF'
            echo "$FAILURES"
            echo 'EOF'
          } >> $GITHUB_OUTPUT
          
          exit $EXIT_CODE
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1

      - name: Copy results from container
        if: always()
        run: |
          docker cp $(docker ps -aq -f name=e2e-runner):/results/. tests/e2e/results/ 2>/dev/null || true
          ls -la tests/e2e/results/ || true

      - name: Post summary
        if: always()
        run: |
          if [ "${{ steps.e2e.outputs.failed }}" = "0" ]; then
            echo "## ✅ E2E Curl Tests Passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**${{ steps.e2e.outputs.passed }}** tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ E2E Curl Tests Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Passed:** ${{ steps.e2e.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
            echo "**Failed:** ${{ steps.e2e.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Failed tests:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.e2e.outputs.failures }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Report check annotation
        if: always()
        run: |
          PASSED="${{ steps.e2e.outputs.passed }}"
          FAILED="${{ steps.e2e.outputs.failed }}"
          FAILURES="${{ steps.e2e.outputs.failures }}"
          
          if [ "$FAILED" = "0" ] || [ -z "$FAILED" ]; then
            echo "::notice title=E2E Curl Tests::✅ ${PASSED:-All} tests passed"
          else
            echo "::error title=E2E Curl Tests::❌ ${FAILED} failed, ${PASSED} passed"
            echo "$FAILURES" | while read -r line; do
              [ -n "$line" ] && echo "::warning::$line"
            done
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: tests/e2e/results/
          retention-days: 7

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose -f tests/e2e/docker-compose.yml logs pinchtab
